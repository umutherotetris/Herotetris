<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SenaryoAI — Yapay Zeka Senaryo Yazarı</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e0c0a;
    --paper: #f5f0e8;
    --cream: #ede6d6;
    --gold: #c9a84c;
    --rust: #b84a2a;
    --fade: #8a7f72;
    --line: rgba(14,12,10,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 999;
  }

  header {
    border-bottom: 1px solid var(--line);
    padding: 2rem 3rem;
    display: flex;
    align-items: baseline;
    gap: 1rem;
    background: var(--paper);
    position: sticky;
    top: 0;
    z-index: 10;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 1.6rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  .logo span {
    color: var(--gold);
    font-style: italic;
  }

  .tagline {
    font-size: 0.65rem;
    color: var(--fade);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-left: 1px solid var(--line);
    padding-left: 1rem;
  }

  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 3rem 2rem 6rem;
  }

  .intro {
    text-align: center;
    margin-bottom: 3.5rem;
    padding-top: 1rem;
  }

  .intro h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    font-weight: 300;
    line-height: 1.1;
    margin-bottom: 0.8rem;
    letter-spacing: -0.02em;
  }

  .intro h1 em {
    font-style: italic;
    color: var(--rust);
  }

  .intro p {
    font-size: 0.75rem;
    color: var(--fade);
    letter-spacing: 0.08em;
  }

  .form-panel {
    background: var(--cream);
    border: 1px solid var(--line);
    border-radius: 2px;
    padding: 2.5rem;
    margin-bottom: 2.5rem;
    position: relative;
  }

  .form-panel::before {
    content: '§';
    position: absolute;
    top: -0.7rem;
    left: 2.5rem;
    background: var(--cream);
    padding: 0 0.5rem;
    color: var(--gold);
    font-family: 'Playfair Display', serif;
    font-size: 1.1rem;
  }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fade);
  }

  input, select, textarea {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 1px;
    padding: 0.65rem 0.85rem;
    font-family: 'DM Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink);
    width: 100%;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--gold);
  }

  textarea {
    resize: vertical;
    min-height: 80px;
    line-height: 1.6;
  }

  select option { background: var(--paper); }

  .generate-btn {
    width: 100%;
    padding: 1rem;
    background: var(--ink);
    color: var(--paper);
    border: none;
    border-radius: 1px;
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }

  .generate-btn:hover { background: #1e1c18; }
  .generate-btn:active { transform: scale(0.995); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .generate-btn .btn-inner {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.6rem;
  }

  .spinner {
    width: 14px; height: 14px;
    border: 1.5px solid rgba(245,240,232,0.3);
    border-top-color: var(--paper);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }

  .spinner.active { display: block; }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Output */
  .output-panel {
    display: none;
    opacity: 0;
    transform: translateY(16px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .output-panel.visible {
    display: block;
    opacity: 1;
    transform: translateY(0);
  }

  .output-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.5rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--line);
  }

  .output-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--rust);
    letter-spacing: 0.05em;
  }

  .copy-btn {
    font-family: 'DM Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--fade);
    background: none;
    border: 1px solid var(--line);
    padding: 0.4rem 0.9rem;
    border-radius: 1px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .copy-btn:hover {
    color: var(--ink);
    border-color: var(--ink);
  }

  .screenplay {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 1px;
    padding: 3rem 4rem;
    font-family: 'Courier New', Courier, monospace;
    font-size: 0.82rem;
    line-height: 1.85;
    color: #111;
    white-space: pre-wrap;
    box-shadow: 0 4px 24px rgba(0,0,0,0.06);
    min-height: 300px;
  }

  .screenplay .scene-heading {
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  /* Typing cursor */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--rust);
    animation: blink 0.8s step-end infinite;
    vertical-align: text-bottom;
    margin-left: 1px;
  }

  @keyframes blink { 50% { opacity: 0; } }

  /* Genre pills */
  .genre-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
  }

  .pill {
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--line);
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s;
    background: transparent;
    font-family: 'DM Mono', monospace;
    color: var(--fade);
  }

  .pill:hover, .pill.active {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }

  .section-label {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--fade);
    margin-bottom: 0.6rem;
  }

  /* Error */
  .error-msg {
    display: none;
    background: #fff0ed;
    border: 1px solid #e8c4bb;
    border-radius: 1px;
    padding: 0.9rem 1.1rem;
    font-size: 0.72rem;
    color: var(--rust);
    margin-top: 1rem;
  }

  .error-msg.visible { display: block; }

  @media (max-width: 600px) {
    .fields-grid { grid-template-columns: 1fr; }
    header { padding: 1.2rem 1.5rem; }
    .form-panel { padding: 1.5rem; }
    .screenplay { padding: 1.5rem; }
    main { padding: 2rem 1rem 4rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Senaryo<span>AI</span></div>
  <div class="tagline">Yapay Zeka Destekli Senaryo Yazarı</div>
</header>

<main>
  <div class="intro">
    <h1>Hikayenizi <em>hayata</em> geçirin</h1>
    <p>Fikrinizi girin — yapay zeka profesyonel senaryo formatında yazısın</p>
  </div>

  <div class="form-panel">
    <div class="section-label" style="margin-bottom:0.8rem">Tür Seçin</div>
    <div class="genre-pills">
      <button class="pill active" data-genre="Dram">Dram</button>
      <button class="pill" data-genre="Komedi">Komedi</button>
      <button class="pill" data-genre="Gerilim">Gerilim</button>
      <button class="pill" data-genre="Korku">Korku</button>
      <button class="pill" data-genre="Romantik">Romantik</button>
      <button class="pill" data-genre="Aksiyon">Aksiyon</button>
      <button class="pill" data-genre="Bilim Kurgu">Bilim Kurgu</button>
      <button class="pill" data-genre="Tarihî">Tarihî</button>
    </div>

    <div class="fields-grid">
      <div class="field">
        <label>Başlık</label>
        <input type="text" id="title" placeholder="Senaryonun başlığı...">
      </div>
      <div class="field">
        <label>Uzunluk</label>
        <select id="length">
          <option value="kısa">Kısa sahne (~1 sayfa)</option>
          <option value="orta" selected>Orta (~3 sayfa)</option>
          <option value="uzun">Uzun (~5 sayfa)</option>
        </select>
      </div>
      <div class="field full">
        <label>Ana Fikir / Özet</label>
        <textarea id="idea" placeholder="Örnek: İstanbul'da yaşayan yaşlı bir balıkçı, 40 yıl önce kaybettiği oğlunun bir balıkçı teknesiyle limana döndüğünü görür..."></textarea>
      </div>
      <div class="field">
        <label>Ana Karakter</label>
        <input type="text" id="character" placeholder="Örn: Ahmet, 68 yaşında emekli öğretmen">
      </div>
      <div class="field">
        <label>Mekan & Zaman</label>
        <input type="text" id="setting" placeholder="Örn: 1990'lar İstanbul, sabah vakti">
      </div>
    </div>

    <button class="generate-btn" id="genBtn" onclick="generateScreenplay()">
      <div class="btn-inner">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">Senaryo Yaz</span>
      </div>
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="output-panel" id="outputPanel">
    <div class="output-header">
      <div class="output-title" id="outputTitle">—</div>
      <button class="copy-btn" onclick="copyScreenplay()">Kopyala</button>
    </div>
    <div class="screenplay" id="screenplayOutput"></div>
  </div>
</main>

<script>
  let selectedGenre = 'Dram';

  document.querySelectorAll('.pill').forEach(pill => {
    pill.addEventListener('click', () => {
      document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
      pill.classList.add('active');
      selectedGenre = pill.dataset.genre;
    });
  });

  async function generateScreenplay() {
    const idea = document.getElementById('idea').value.trim();
    if (!idea) {
      showError('Lütfen en az bir ana fikir girin.');
      return;
    }

    const title = document.getElementById('title').value.trim() || 'İsimsiz';
    const length = document.getElementById('length').value;
    const character = document.getElementById('character').value.trim();
    const setting = document.getElementById('setting').value.trim();

    const lengthMap = { kısa: '1 sayfalık kısa', orta: '3 sayfalık orta uzunlukta', uzun: '5 sayfalık uzun' };

    const prompt = `Sen profesyonel bir Türk senaryo yazarısın. Aşağıdaki bilgilere göre ${lengthMap[length]} bir senaryo yaz.

BAŞLIK: ${title}
TÜR: ${selectedGenre}
ANA FİKİR: ${idea}
${character ? `ANA KARAKTER: ${character}` : ''}
${setting ? `MEKAN & ZAMAN: ${setting}` : ''}

Standart Hollywood senaryo formatını kullan:
- MEKAN BAŞLIKLARI (İÇ./DIŞ. — YER — GÜN/GECE): büyük harfle
- EYLEM/TASVIR satırları: normal yazı
- KARAKTER ADI: ortalanmış, büyük harfle
- DIYALOG: karakter adının altında, girintili
- (PARANTEZ): sahne notları için

Türkçe yaz. Akıcı, duygusal ve sinematik bir dil kullan. Sadece senaryoyu yaz, açıklama ekleme.`;

    setLoading(true);
    hideError();

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{ role: 'user', content: prompt }]
        })
      });

      const data = await response.json();

      if (!response.ok) {
        throw new Error(data.error?.message || 'API hatası');
      }

      const text = data.content?.map(b => b.text || '').join('') || '';

      setLoading(false);
      displayScreenplay(title, text);

    } catch (err) {
      setLoading(false);
      showError('Senaryo oluşturulurken hata: ' + err.message);
    }
  }

  function displayScreenplay(title, text) {
    document.getElementById('outputTitle').textContent = title.toUpperCase();
    const panel = document.getElementById('outputPanel');
    const output = document.getElementById('screenplayOutput');
    output.textContent = '';
    panel.style.display = 'block';
    panel.style.opacity = '0';
    panel.style.transform = 'translateY(16px)';

    setTimeout(() => {
      panel.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      panel.style.opacity = '1';
      panel.style.transform = 'translateY(0)';
    }, 10);

    // Typewriter effect
    let i = 0;
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    output.appendChild(cursor);

    const speed = text.length > 1500 ? 8 : text.length > 800 ? 12 : 18;

    function type() {
      if (i < text.length) {
        output.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        setTimeout(type, speed);
      } else {
        cursor.remove();
      }
    }

    type();
    panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function setLoading(state) {
    const btn = document.getElementById('genBtn');
    const spinner = document.getElementById('spinner');
    const btnText = document.getElementById('btnText');
    btn.disabled = state;
    spinner.classList.toggle('active', state);
    btnText.textContent = state ? 'Yazıyor...' : 'Senaryo Yaz';
  }

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function hideError() {
    document.getElementById('errorMsg').classList.remove('visible');
  }

  function copyScreenplay() {
    const text = document.getElementById('screenplayOutput').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Kopyalandı ✓';
      setTimeout(() => btn.textContent = 'Kopyala', 2000);
    });
  }
</script>

</body>
</html>
